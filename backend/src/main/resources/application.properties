# ============================================================
# HomeMitra - Spring Boot Application Properties
# Uses environment variables for all secrets (safe for Render)
# ============================================================
spring.application.name=homemitra-api
server.port=${PORT:8080}

# Database (set SPRING_DATASOURCE_URL, DB_USERNAME, DB_PASSWORD in Render env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/homemitra?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Avi123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT (set JWT_SECRET in Render env vars)
app.jwt.secret=${JWT_SECRET:HomeMitraSecretKey2024_ChangeInProduction_MustBe256BitsLong!}
app.jwt.expiry-ms=86400000
app.jwt.refresh-expiry-ms=604800000

# Razorpay (set RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET in Render env vars)
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_SZHJcqLIZ46wFR}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:PdzjHfwgpiIj7SQrGslCQrFZ}

# Mail (set MAIL_USERNAME, MAIL_PASSWORD in Render env vars)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:avishkarspansare@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS (set ALLOWED_ORIGINS in Render env vars to your frontend URL)
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:5500}

# Logging
logging.level.com.homemitra=INFO
logging.level.org.springframework.security=WARN

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
