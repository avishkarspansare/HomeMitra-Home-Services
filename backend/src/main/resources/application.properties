# ============================================================
# HomeMitra - Spring Boot Application Properties
# All secrets come from environment variables.
# Set them in your Render dashboard (never hardcode here).
# ============================================================
spring.application.name=homemitra-api
server.port=${PORT:8080}

# ── Database (Aiven MySQL) ────────────────────────────────────
# Set SPRING_DATASOURCE_URL in Render env vars, e.g.:
#   jdbc:mysql://host:port/dbname?useSSL=true&requireSSL=true&serverTimezone=UTC
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Aiven free tier: max 5 connections
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ───────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiry-ms=86400000
app.jwt.refresh-expiry-ms=604800000

# ── Razorpay ──────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# ── Mail (Gmail SMTP) ─────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ── CORS ──────────────────────────────────────────────────────
# ALLOWED_ORIGINS env var: comma-separated list of frontend URLs.
# Local dev default — override with Render env var in production.
# Example: https://homemitra-home-services.onrender.com
app.cors.allowed-origins=${ALLOWED_ORIGINS}

# ── Logging ───────────────────────────────────────────────────
logging.level.com.homemitra=INFO
logging.level.org.springframework.security=WARN

# ── OpenAPI / Swagger ─────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
