<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services – HomeMitra</title>
  <link rel="stylesheet" href="../css/global.css">
  <style>
    body { padding-top: 70px; }
    .page-hero { background: linear-gradient(135deg, #0f172a, #1e1b4b); color: white; padding: 4rem 0 3rem; }
    .page-hero h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .page-hero p { opacity: 0.75; }
    .search-bar { display: flex; gap: 1rem; margin-top: 2rem; max-width: 600px; }
    .search-bar input { flex: 1; padding: 0.85rem 1.25rem; border: none; border-radius: var(--radius-sm); font-size: 0.95rem; font-family: 'DM Sans',sans-serif; }
    .layout { display: grid; grid-template-columns: 260px 1fr; gap: 2.5rem; padding: 3rem 0; align-items: start; }
    .filters { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 1.5rem; position: sticky; top: 90px; }
    .filter-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--mid); margin-bottom: 1rem; }
    .filter-title:not(:first-child) { margin-top: 1.5rem; }
    .cat-filter-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.75rem; border-radius: 8px; cursor: pointer; transition: all var(--transition); font-size: 0.88rem; }
    .cat-filter-item:hover { background: var(--primary-light); color: var(--primary); }
    .cat-filter-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
    .price-range { display: flex; gap: 0.5rem; }
    .price-input { width: 100%; padding: 0.5rem 0.75rem; border: 2px solid var(--border); border-radius: 8px; font-size: 0.85rem; font-family: 'DM Sans',sans-serif; }
    .price-input:focus { outline: none; border-color: var(--primary); }
    .sort-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .sort-bar select { padding: 0.5rem 1rem; border: 2px solid var(--border); border-radius: 8px; font-family: 'DM Sans',sans-serif; font-size: 0.88rem; cursor: pointer; }
    .sort-bar select:focus { outline: none; border-color: var(--primary); }
    .results-count { font-size: 0.9rem; color: var(--mid); }
    .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
    .svc-card { background: white; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); transition: all var(--transition); cursor: pointer; }
    .svc-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); border-color: var(--primary); }
    .svc-img { height: 140px; background: linear-gradient(135deg, var(--primary-light), #e0e7ff); display: flex; align-items: center; justify-content: center; font-size: 3.5rem; position: relative; }
    .svc-featured { position: absolute; top: 8px; right: 8px; background: var(--accent); color: white; font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 6px; }
    .svc-body { padding: 1.1rem; }
    .svc-category { font-size: 0.72rem; color: var(--primary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
    .svc-name { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
    .svc-desc { font-size: 0.82rem; color: var(--mid); margin-bottom: 0.6rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .svc-meta { display: flex; align-items: center; justify-content: space-between; }
    .svc-price { font-size: 1.1rem; font-weight: 800; color: var(--primary); }
    .svc-rating { font-size: 0.78rem; color: var(--mid); display: flex; align-items: center; gap: 3px; }
    .no-results { text-align: center; padding: 4rem; color: var(--mid); }
    .no-results .icon { font-size: 4rem; margin-bottom: 1rem; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .filters { position: static; } }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="container nav-inner">
    <a href="../../index.html" class="nav-logo"><span>Home</span><span>Mitra</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="../../index.html">Home</a></li>
      <li><a href="services.html" class="active">Services</a></li>
      <li><a href="subscriptions.html">Plans</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
    </ul>
    <div class="nav-actions" id="navActions"></div>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </div>
</nav>

<div class="page-hero">
  <div class="container">
    <h1>All Services</h1>
    <p>Explore 100+ professional home services delivered by verified experts</p>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search services..." oninput="debounceSearch(this.value)">
      <button class="btn btn-primary" onclick="doSearch()">Search</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="layout">
    <!-- FILTERS -->
    <aside class="filters">
      <div class="filter-title">Categories</div>
      <div id="catFilters">
        <div class="cat-filter-item active" data-id="" onclick="filterCat('',this)">🏠 All Services</div>
      </div>
      <div class="filter-title">Price Range</div>
      <div class="price-range">
        <input type="number" class="price-input" id="minPrice" placeholder="Min ₹" oninput="applyFilters()">
        <input type="number" class="price-input" id="maxPrice" placeholder="Max ₹" oninput="applyFilters()">
      </div>
      <div class="filter-title">Rating</div>
      <div style="display:flex;flex-direction:column;gap:0.4rem">
        <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.88rem;cursor:pointer"><input type="radio" name="rating" value="" onchange="applyFilters()" style="accent-color:var(--primary)" checked> All</label>
        <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.88rem;cursor:pointer"><input type="radio" name="rating" value="4" onchange="applyFilters()" style="accent-color:var(--primary)"> ⭐ 4+ Stars</label>
        <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.88rem;cursor:pointer"><input type="radio" name="rating" value="4.5" onchange="applyFilters()" style="accent-color:var(--primary)"> ⭐ 4.5+ Stars</label>
      </div>
      <div class="filter-title">Duration</div>
      <div style="display:flex;flex-direction:column;gap:0.4rem">
        <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.88rem;cursor:pointer"><input type="radio" name="dur" value="" onchange="applyFilters()" style="accent-color:var(--primary)" checked> Any</label>
        <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.88rem;cursor:pointer"><input type="radio" name="dur" value="60" onchange="applyFilters()" style="accent-color:var(--primary)"> Under 1 hour</label>
        <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.88rem;cursor:pointer"><input type="radio" name="dur" value="120" onchange="applyFilters()" style="accent-color:var(--primary)"> 1–2 hours</label>
      </div>
      <button class="btn btn-secondary btn-full mt-3 btn-sm" onclick="clearFilters()">Clear Filters</button>
    </aside>

    <!-- MAIN -->
    <div>
      <div class="sort-bar">
        <span class="results-count" id="resultsCount">Loading...</span>
        <select id="sortSelect" onchange="applyFilters()">
          <option value="popular">Most Popular</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating">Highest Rated</option>
        </select>
      </div>
      <div class="services-grid" id="servicesGrid"></div>
      <div id="noResults" class="no-results hidden">
        <div class="icon">🔍</div>
        <h3>No services found</h3>
        <p>Try different search terms or adjust your filters</p>
        <button class="btn btn-primary mt-2" onclick="clearFilters()">Clear Filters</button>
      </div>
    </div>
  </div>
</div>

<script src="../js/env-config.js"></script>
  <script src="../js/api.js"></script>
<script>
initNavbar();
let allServices = [], activeCat = '';

function renderStarsHTML(r){ return Array.from({length:5},(_,i)=>`<span class="star${i<r?'':' empty'}">★</span>`).join(''); }

// Load categories
api.categories.all().then(res => {
  const cf = document.getElementById('catFilters');
  res.data.forEach(c => {
    const d = document.createElement('div');
    d.className = 'cat-filter-item'; d.dataset.id = c.id;
    d.innerHTML = `${c.icon} ${c.name}`;
    d.onclick = () => filterCat(c.id, d);
    cf.appendChild(d);
  });
}).catch(() => {});

// Load services
function loadServices(catId) {
  const grid = document.getElementById('servicesGrid');
  grid.innerHTML = Array.from({length:8},()=>`<div class="svc-card skeleton" style="height:280px"></div>`).join('');
  const p = catId ? api.services.byCategory(catId) : api.services.all(0, 50);
  p.then(res => {
    allServices = catId ? res.data : res.data.content || res.data;
    applyFilters();
  }).catch(() => {
    // Fallback mock
    allServices = [
      {id:1,slug:'deep-home-cleaning',name:'Deep Home Cleaning',shortDesc:'Professional full home clean',basePrice:499,durationMins:120,ratingAvg:4.8,totalBookings:1240,featured:true,categoryName:'Cleaning',categoryIcon:'🧹'},
      {id:2,slug:'pipe-leak-repair',name:'Pipe Leak Repair',shortDesc:'Fix leaks fast and clean',basePrice:799,durationMins:60,ratingAvg:4.7,totalBookings:980,featured:true,categoryName:'Plumbing',categoryIcon:'🚿'},
      {id:3,slug:'fan-installation',name:'Fan Installation',shortDesc:'Ceiling & exhaust fans fitted safely',basePrice:699,durationMins:45,ratingAvg:4.6,totalBookings:745,categoryName:'Electrical',categoryIcon:'🔌'},
      {id:4,slug:'bridal-makeup',name:'Bridal Makeup',shortDesc:'Professional bridal look at home',basePrice:3999,durationMins:180,ratingAvg:4.9,totalBookings:432,featured:true,categoryName:'Salon',categoryIcon:'💅'},
      {id:5,slug:'ac-service',name:'AC Service & Repair',shortDesc:'AC cleaning, gas refill & repairs',basePrice:1499,durationMins:90,ratingAvg:4.7,totalBookings:1100,featured:true,categoryName:'Appliances',categoryIcon:'🔧'},
      {id:6,slug:'bathroom-cleaning',name:'Bathroom Deep Cleaning',shortDesc:'Sanitise & scrub all surfaces',basePrice:299,durationMins:60,ratingAvg:4.5,totalBookings:670,categoryName:'Cleaning',categoryIcon:'🧹'},
      {id:7,slug:'sofa-cleaning',name:'Sofa & Carpet Cleaning',shortDesc:'Steam cleaning for upholstery',basePrice:899,durationMins:90,ratingAvg:4.6,totalBookings:520,categoryName:'Cleaning',categoryIcon:'🧹'},
      {id:8,slug:'cockroach-treatment',name:'Cockroach Treatment',shortDesc:'Safe pest elimination',basePrice:899,durationMins:60,ratingAvg:4.4,totalBookings:310,categoryName:'Pest Control',categoryIcon:'🐛'},
    ];
    applyFilters();
  });
}

function filterCat(id, el) {
  activeCat = id;
  document.querySelectorAll('.cat-filter-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  loadServices(id);
}

function applyFilters() {
  let data = [...allServices];
  const q = document.getElementById('searchInput').value.toLowerCase();
  const minP = parseFloat(document.getElementById('minPrice').value) || 0;
  const maxP = parseFloat(document.getElementById('maxPrice').value) || Infinity;
  const rating = parseFloat(document.querySelector('input[name="rating"]:checked')?.value || 0);
  const dur = parseInt(document.querySelector('input[name="dur"]:checked')?.value || 0);
  const sort = document.getElementById('sortSelect').value;

  if (q) data = data.filter(s => s.name.toLowerCase().includes(q) || (s.shortDesc||'').toLowerCase().includes(q));
  data = data.filter(s => s.basePrice >= minP && s.basePrice <= maxP);
  if (rating) data = data.filter(s => (s.ratingAvg||0) >= rating);
  if (dur) data = data.filter(s => s.durationMins <= dur);

  if (sort === 'price-asc') data.sort((a,b) => a.basePrice - b.basePrice);
  else if (sort === 'price-desc') data.sort((a,b) => b.basePrice - a.basePrice);
  else if (sort === 'rating') data.sort((a,b) => (b.ratingAvg||0) - (a.ratingAvg||0));
  else data.sort((a,b) => (b.totalBookings||0) - (a.totalBookings||0));

  renderServices(data);
}

function renderServices(data) {
  const grid = document.getElementById('servicesGrid');
  const noR = document.getElementById('noResults');
  document.getElementById('resultsCount').textContent = `${data.length} service${data.length!==1?'s':''} found`;
  if (!data.length) { grid.innerHTML = ''; noR.classList.remove('hidden'); return; }
  noR.classList.add('hidden');
  grid.innerHTML = data.map(s => `
    <div class="svc-card" onclick="location.href='service-detail.html?slug=${s.slug}'">
      <div class="svc-img"><span>${s.categoryIcon||'🏠'}</span>${s.featured?'<span class="svc-featured">⭐ Popular</span>':''}</div>
      <div class="svc-body">
        <div class="svc-category">${s.categoryName||''}</div>
        <div class="svc-name">${s.name}</div>
        <div class="svc-desc">${s.shortDesc||''}</div>
        <div class="svc-meta">
          <div class="svc-price">${formatPrice(s.basePrice)}</div>
          <div class="svc-rating">${renderStarsHTML(Math.round(s.ratingAvg||4))} ${(s.ratingAvg||4.5).toFixed(1)}</div>
        </div>
        <div style="font-size:0.78rem;color:var(--mid);margin-top:0.4rem">⏱️ ${s.durationMins} mins</div>
      </div>
    </div>`).join('');
}

let searchTimer;
function debounceSearch(v) { clearTimeout(searchTimer); searchTimer = setTimeout(() => applyFilters(), 300); }
function doSearch() { applyFilters(); }
function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('minPrice').value = '';
  document.getElementById('maxPrice').value = '';
  document.querySelectorAll('input[name="rating"]')[0].checked = true;
  document.querySelectorAll('input[name="dur"]')[0].checked = true;
  document.getElementById('sortSelect').value = 'popular';
  filterCat('', document.querySelector('.cat-filter-item'));
}

// Check URL params
const params = new URLSearchParams(location.search);
const catParam = params.get('category');
if (catParam) {
  setTimeout(() => {
    const el = document.querySelector(`[data-id="${catParam}"]`);
    if (el) filterCat(catParam, el);
    else loadServices(catParam);
  }, 400);
} else { loadServices(''); }
</script>
</body>
</html>
