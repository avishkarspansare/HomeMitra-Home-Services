services:
  # ─── Backend: Spring Boot API ────────────────────────────────────────
  - type: web
    name: homemitra-backend
    runtime: java
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/*.jar"
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        sync: false   # Fill this in Render dashboard after creating DB
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false   # Set to your frontend Render URL, e.g. https://homemitra-frontend.onrender.com

  # ─── Frontend: Static Site ────────────────────────────────────────────
  - type: web
    name: homemitra-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: .
    staticPublishPath: .
    buildCommand: "echo 'No build needed'"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
