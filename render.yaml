services:
  # ─── Backend: Spring Boot API ─────────────────────────────────────────
  - type: web
    name: homemitra-backend
    runtime: java
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/*.jar"
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        sync: false   # jdbc:mysql://host:port/db?useSSL=true&requireSSL=true&serverTimezone=UTC
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
        # ⚠️  Set this to your EXACT frontend URL, e.g.:
        #     https://homemitra-home-services.onrender.com
        # Multiple URLs: https://homemitra-home-services.onrender.com,https://www.yourdomain.com

  # ─── Frontend: Static Site ────────────────────────────────────────────
  - type: web
    name: homemitra-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: .
    staticPublishPath: .
    # Injects the backend URL at build time — no hardcoding in JS files
    buildCommand: "sed -i 's|__BACKEND_URL__|'\"$BACKEND_URL\"'|g' frontend/js/env-config.js"
    envVars:
      - key: BACKEND_URL
        sync: false
        # ⚠️  Set this to your EXACT backend URL, e.g.:
        #     https://homemitra-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
